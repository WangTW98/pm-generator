interface:
  display_name: "PM 03 Page Layout"
  short_description: "Generate or test page layout specs from sitemap"
  default_prompt: "Use $pm-03-page-layout to create or update one page layout spec under product/pages/<来源Sitemap Layout>/<完整父子目录链>/ from one sitemap PAGE ID. Always read IDs, parent IDs, page types, names, roles, and state groups from 2.2.页面清单 and compute paths from the page-list parent tree. Record 来源Sitemap and 使用Layout, but do not inline global layout/sitemap shell elements; downstream skills merge global layout later from those references. Describe the current page body only, with default state first, then a state list and state deltas. Make the default-state structure concrete without changing the schema: expand tag groups, segmented controls, tabs, links, agreement areas, form rows, table/list/card containers, and option sets into concrete visible child elements in 1.3, 1.4, 1.5, and default-state mock data; do not leave broad final leaves such as 能力标签、相关链接、表单项、操作按钮、信息列表、数据表格 when child labels or controls are known or inferable. When updating an existing layout.md from user edits, section 3/4 notes, or a natural-language change request, treat visible-content changes as structured patches and synchronize all affected sections: 1.3 page description, 1.4 default-state structure diagram, 1.5 atomic element table, and 2.2 mock data. Preserve existing PLE/PGR/PEL/MOCK IDs for unchanged semantic elements and never leave stale references. Generate 1.4 默认状态页面结构图 as a Mermaid flowchart from 1.3.1 默认状态页面结构; do not treat it as a synchronized mirror of 1.5 页面元素清单. Do not create 元素来源 = Sitemap Layout rows; element rows must use Page Content, Derived State, or Mock Data. Default-state visible controls must use 是否状态差异元素 = 否; represent later loading, disabled, validation, success, or error variants as separate Derived State rows. If the sitemap or user says 思维导图优先, first validate that the page list fully mirrors 2.1.sitemap思维导图. Do not create text-only path segments or insert STATE group folders. State groups are metadata for baseline reuse only and must not alter paths. Eligible types are 页面 and 状态; 节点 is skipped. If the instruction says test, dry run, preview, or directory-only, compute the canonical path and create an empty Markdown placeholder file without generating page layout content."

interface:
  display_name: "PM 06 Page Style"
  short_description: "Generate render-ready Figma JSON nodes with consistency profiles"
  default_prompt: "Use $pm-06-page-style to generate a default-state-only, render-ready Figma JSON node document for one product/pages/**/layout.md. Resolve the pm-05 design spec from a user-specified design directory or auto-match a valid design/* directory. Read the source page's 来源Sitemap, 使用Layout, 页面清单ID, 默认状态页面结构, default-state element list, and default-state mock data; then read the source sitemap to merge the global layout shell. Classify a generic pageIntent, apply the matching semantic pattern, run semanticValidation, and fail or repair pages whose structure conflicts with the intent. Exclude empty/loading/error/success/overlay state variants from generated Figma nodes and record them only in notes or excludedStates. Use tokens.json, figma-tokens.json, component-rules.json, component-blueprints.json, figma-render-rules.json, ai-generation-rules.json, consistency-rules.json, layout-profile-schema.json, and page-intent-patterns.json to create product/pages/**/figma-nodes.json and figma-node-notes.md. The JSON must include renderSpec with component adapters, constraints, text policies, layout safety, and QA expectations; it must include top-level consistency with layoutKey, pageIntentKey, stateGroupKey, designSpecKey, profileRefs, styleFingerprint, lockedPropertiesApplied, and driftCheck; it must be valid, token-referenced, traceable, semantically correct, profile-consistent, and suitable for deterministic later Figma restoration."

policy:
  allow_implicit_invocation: true

interface:
  display_name: "PM 02 Sitemap"
  short_description: "Generate app sitemap docs from overview"
  default_prompt: "Use $pm-02-sitemap to create or update product/layout/<应用端>-sitemap.md. Use only three sitemap item types: 节点, 页面, 状态; never output 弹窗, Tab, 页面组, or custom page types. Before updates run the blocking consistency check between both pairs: layout mind map vs layout table, and sitemap mind map vs page list. If either pair is inconsistent, do not write or output an updated sitemap; reply only with the priority question for the inconsistent pair. After the user chooses 思维导图优先 or 数据列表优先, freeze that chosen source for the selected pair: do not rewrite its structure, visible text, order, IDs, types, hierarchy, state groups, or notes; synchronize only the other side. The layout table must fully mirror the layout mind map: every layout element has one LYT/LYG/LYE row and 区域/分组/元素/类型 reconstruct the same tree. The page list must fully mirror the sitemap mind map: every mind-map item has a PAGE-xxx row, every row appears in the mind map, and 父级ID/层级 reconstruct the same tree. Represent modal/dialog/drawer items as 页面 with 呈现形式 in notes. Keep same 状态组 rows under one semantic state-group container, use specific standalone state names, and record 状态组名称 when allowed by the chosen source."

interface:
  display_name: "PM 04 Page Layout Batch"
  short_description: "Batch orchestrate or test page layout generation"
  default_prompt: "Use $pm-04-page-layout-batch to create or resume a batch task list and generate page layouts from the specified sitemap, or all product/layout/*-sitemap.md files if none is specified. Always read candidates, metadata, and paths from 2.2.页面清单 and compute paths from the page-list parent tree. If a sitemap says 思维导图优先, first validate that the page list fully mirrors 2.1.sitemap思维导图. Do not compare or pause on page document 1.4/1.5 differences; pm-03 generates 1.4 默认状态页面结构图 from 1.3.1 默认状态页面结构. After each pm03 generation, run the Generic Template Pollution Guard against the sitemap row and generated layout.md; retry once or mark Failed if a page was mechanically forced into a generic filter-table template. Do not create text-only path segments or insert STATE group folders. State groups are metadata for baseline reuse only and must not alter paths. Eligible types are 页面 and 状态; 节点 is skipped. If the instruction says test, dry run, preview, or directory-only, compute canonical paths and create empty Markdown placeholder files without generating page layout content."

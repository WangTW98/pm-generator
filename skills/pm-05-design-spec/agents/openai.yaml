interface:
  display_name: "PM 05 Design Spec"
  short_description: "Create design specs, render-ready JSON, HTML previews, and consistency profiles"
  default_prompt: "Use $pm-05-design-spec to create or update a complete design specification from my natural-language style description. Store the result under design/<auto-generated-design-name>/ with design-spec.md, index.html, tokens.json, figma-tokens.json, component-rules.json, component-blueprints.json, figma-render-rules.json, ai-generation-rules.json, consistency-rules.json, layout-profile-schema.json, and page-intent-patterns.json. The Markdown must use assets/design-spec-template.md, include concrete design tokens, responsive rules for mobile app, mobile web, tablet, PC web, and PC desktop app, component rules, Figma component blueprints, renderer layout/overflow/QA rules, semanticPatterns for generic page intents, pageIntentStrategies for downstream generation, cross-page layout/pageIntent/stateGroup consistency rules, and AI page-generation constraints. The JSON files must be valid, machine-readable, and suitable for downstream page-to-Figma JSON node generation, consistency profile reuse, and Figma restoration. The HTML must be self-contained and visually show the color palette, typography, spacing, radii, shadows, components, consistency rules, and multi-device sample screens."

policy:
  allow_implicit_invocation: true

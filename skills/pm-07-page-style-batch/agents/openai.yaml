interface:
  display_name: "PM 07 Page Style Batch"
  short_description: "Batch generate render-ready Figma JSON nodes with consistency profiles"
  default_prompt: "Use $pm-07-page-style-batch to scan product/pages/**/layout.md and batch-generate figma-nodes.json and figma-node-notes.md beside each layout by orchestrating pm-06-page-style. This is a pure orchestrator: each eligible layout.md must invoke pm-06-page-style once as a fresh single-page execution; do not combine pages, carry prior page conversational context into the next page, or generate figma-nodes.json inside pm07. If separate pm06 invocation is unavailable, mark the affected task Failed with pm06 invocation unavailable. Create or resume a task list under product/pages/_style-batch-tasks/. Preserve pm-06's default-state-only, pageIntent, semanticValidation, renderSpec, and consistency rules. Group tasks by designSpecKey, layoutKey, pageIntentKey, and stateGroupKey; create or reuse product/style-profiles/<layoutKey>/ profiles; confirm each output includes component adapters, text policies, constraints, layout safety, QA expectations, profileRefs, styleFingerprint, lockedPropertiesApplied, and driftCheck. Do not synthesize generic JSON in pm07 itself or coerce every page into a shared template. If I specify a design/<name> directory, use it for all pages; otherwise auto-match valid design/* specs."

policy:
  allow_implicit_invocation: true

display_name: "PM 10 Figma Checkout"
short_description: "Inspect and safely repair Figma layout, reusable elements, state clusters, and styles"
default_prompt: "Use pm-10-figma-checkout to inspect this Figma link and required target canvas. First read product/Product Overview.md and product/layout/*.md to build ProductLayoutModel, ReusableElementCatalog, and stateVariantClusters from sitemap pages, regions, elements, and state groups. If the selected canvas contains multiple root frames/components/sections, create a BatchExecutionPlan and process it in a loop: global index, frame-local batches, state-cluster batches, reusable-cluster batches, then final QA. Do not deep-read or repair the whole large canvas in one call. Then inspect layout disorder, Auto Layout issues, absolute positioning, FILL/HUG sizing, cross-frame relationships, all reusable element clusters, component family structure/style/token drift, same-state shared region consistency, navigation/Tab active state mismatch, and redundant generated content. If no frame/component/node is specified, inspect and safely repair all eligible elements in the canvas by batches. If no canvas is specified, ask which canvas to use before modifying Figma."

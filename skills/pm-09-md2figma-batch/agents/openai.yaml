name: pm-09-md2figma-batch
display_name: PM 09 MD to Figma Batch
description: Batch restore product/pages/**/figma-nodes.json files into a user-specified Figma link by orchestrating pm-08-md2figma with profile-locked consistency.
default_prompt: >-
  Use pm-09-md2figma-batch to scan product/pages/**/figma-nodes.json, create a batch task list, and call pm-08-md2figma for each valid file to restore it into the specified Figma link.
  Sort and group tasks by designSpecKey, layoutKey, pageIntentKey, and stateGroupKey when consistency metadata exists. Do not compress, rewrite, or simplify the source JSON node tree; each page must be handed to pm-08-md2figma so it can recursively render figmaDocument and honor renderSpec, consistency profileRefs, styleFingerprint, driftCheck, component blueprints, text policies, layout constraints, and QA expectations.
inputs:
  required:
    - Figma design link
  optional:
    - scan directory
    - page id filter
    - write mode
    - dry run
    - resume batch task file
outputs:
  - product/pages/_md2figma-batch-tasks/<batch-id>-md2figma-batch.md
  - per-page figma-restore-report.md files generated by pm-08-md2figma
constraints:
  - Do not write to Figma without a user-specified Figma link.
  - Do not bypass pm-08-md2figma rules.
  - Do not compress or rewrite source figma-nodes.json structures.
  - Do not ignore renderSpec or pm08 component-adapter/layout/QA requirements.
  - Do not ignore consistency, profileRefs, styleFingerprint, driftCheck, or pm08 profile-locked mode.
  - Do not generate non-default UI states.
  - Continue other tasks when one page fails unless the user requests fail-fast behavior.
